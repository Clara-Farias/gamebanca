<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar de Soluções — Painel da Banca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a1e14;
    --bg-deep2:#0f2a1c;
    --panel:#12331f;
    --panel-soft:#173a25;
    --line:rgba(180,222,63,0.14);
    --text:#f2f6ec;
    --muted:#9fb6a8;
    --lime:#9fe63d;
    --lime-soft:#c9f27a;
    --campo:#5c8f3a;
    --campo-soft:#dcebc9;
    --relacionamento:#c7dd4f;
    --relacionamento-soft:#f3f7d9;
    --cobranca:#1c4a30;
    --cobranca-line:#3f8558;
    --c-impacto:#3d5a99;
    --c-viabilidade:#b0672c;
    --c-estrategia:#3f8c50;
    --c-inovacao:#8website:#6a4b9c;
    --c-inovacao:#6a4b9c;
    --c-risco:#a94040;
    --radius:18px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 85% -10%, rgba(159,230,61,0.10), transparent 45%),
      radial-gradient(circle at -10% 40%, rgba(159,230,61,0.06), transparent 40%),
      linear-gradient(180deg,var(--bg-deep),var(--bg-deep2));
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Baloo 2',sans-serif;}
  #app{max-width:1180px;margin:0 auto;padding:20px 20px 80px;}

  /* ---------- HEADER ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:6px 4px 22px;position:relative;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand svg{flex-shrink:0;}
  .brand-text h1{font-size:26px;margin:0;font-weight:800;letter-spacing:0.3px;line-height:1;}
  .brand-text h1 span{color:var(--lime);}
  .brand-text p{margin:4px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:0.4px;text-transform:uppercase;}
  .radar-sweep{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0.5;}
  @media (prefers-reduced-motion: no-preference){
    .radar-sweep .sweep-line{
      position:absolute;top:-120px;right:-60px;width:340px;height:340px;border-radius:50%;
      background:conic-gradient(from 0deg, rgba(159,230,61,0.22), transparent 30%);
      animation:spin 6s linear infinite;
    }
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- NAV ---------- */
  nav.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .tab-btn{
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:10px 16px;border-radius:999px;font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s ease;
  }
  .tab-btn:hover{border-color:var(--lime);}
  .tab-btn.active{background:var(--lime);color:#0a1e14;border-color:var(--lime);}
  .tab-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* ---------- VERTICAL HERO ---------- */
  .v-hero{border-radius:var(--radius);padding:26px 26px;margin-bottom:22px;position:relative;overflow:hidden;border:1px solid var(--line);}
  .v-hero h2{margin:0 0 6px;font-size:24px;}
  .v-hero p.tagline{margin:0 0 14px;color:rgba(255,255,255,0.82);font-size:13.5px;max-width:640px;}
  .team-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:11.5px;padding:5px 10px;border-radius:999px;background:rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.18);}

  .v-actions{display:flex;justify-content:space-between;align-items:center;margin:0 0 14px;flex-wrap:wrap;gap:10px;}
  .btn{
    border:none;border-radius:999px;padding:10px 18px;font-weight:700;font-size:13.5px;cursor:pointer;
    font-family:'Inter',sans-serif;transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--lime);color:#0a1e14;}
  .btn-primary:hover{opacity:0.9;}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--lime);}
  .btn-danger{background:transparent;color:#e08a8a;border:1px solid rgba(224,138,138,0.4);}

  .mini-rank{font-size:12.5px;color:var(--muted);}
  .mini-rank b{color:var(--lime-soft);}

  /* ---------- NEW IDEA FORM ---------- */
  .new-idea-form{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
  .field input, .field select{
    background:var(--bg-deep);border:1px solid var(--line);color:var(--text);border-radius:var(--radius-sm);
    padding:9px 12px;font-family:'Inter',sans-serif;font-size:13.5px;min-width:200px;
  }
  .field input:focus, .field select:focus{outline:none;border-color:var(--lime);}

  /* ---------- IDEA CARDS ---------- */
  .idea-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
  .idea-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;transition:border-color .15s ease;}
  .idea-card:hover{border-color:rgba(159,230,61,0.35);}
  .idea-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;}
  .idea-name{font-weight:700;font-size:15.5px;margin:0 0 4px;}
  .idea-meta{font-size:11.5px;color:var(--muted);display:flex;gap:8px;align-items:center;}
  .day-badge{background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:999px;}
  .ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-total{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:'Baloo 2',sans-serif;}
  .star-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:2px;color:rgba(255,255,255,0.3);}
  .star-btn.active{color:#ffd84a;}

  .expand-panel{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);display:flex;flex-direction:column;gap:14px;}
  .crit-row label{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:5px;}
  .crit-row label .pts{color:var(--muted);font-weight:500;}
  .crit-row input[type=range]{
    width:100%;-webkit-appearance:none;height:7px;border-radius:999px;background:rgba(255,255,255,0.12);outline:none;
  }
  .crit-row input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--dot,var(--lime));
    border:2px solid #0a1e14;cursor:pointer;
  }
  .crit-row .hint{font-size:11px;color:var(--muted);margin-top:5px;font-style:italic;}
  .crit-impacto{--dot:var(--c-impacto);}
  .crit-viabilidade{--dot:var(--c-viabilidade);}
  .crit-estrategia{--dot:var(--c-estrategia);}
  .crit-inovacao{--dot:var(--c-inovacao);}
  .crit-risco{--dot:var(--c-risco);}
  .stripe{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle;}

  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .nominee-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}

  .empty-state{padding:40px 20px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:var(--radius);}

  /* ---------- PAINEL GERAL ---------- */
  .panel-section{margin-bottom:28px;}
  .panel-section h3{margin:0 0 4px;font-size:19px;}
  .panel-section p.sub{margin:0 0 14px;color:var(--muted);font-size:12.5px;}

  .award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .award-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
  .award-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;background:var(--aw-color,var(--lime));}
  .award-card h4{margin:0 0 4px;font-size:15.5px;}
  .award-card .award-desc{font-size:11.5px;color:var(--muted);margin:0 0 12px;}
  .award-value-tag{display:inline-block;background:rgba(159,230,61,0.15);color:var(--lime-soft);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:10px;}
  .winner-block{background:rgba(0,0,0,0.2);border-radius:var(--radius-sm);padding:10px 12px;}
  .winner-name{font-weight:700;font-size:14px;}
  .winner-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .no-winner{color:var(--muted);font-size:12.5px;font-style:italic;}
  select.pick{width:100%;background:var(--bg-deep);color:var(--text);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;margin-top:4px;}

  table.rank-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.rank-table th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;padding:8px 10px;border-bottom:1px solid var(--line);}
  table.rank-table td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,0.05);}
  table.rank-table tr:hover td{background:rgba(255,255,255,0.02);}
  .pos{font-family:'Baloo 2',sans-serif;font-weight:700;color:var(--lime-soft);}
  .v-tag{font-size:10.5px;padding:2px 8px;border-radius:999px;}

  .footer-actions{display:flex;justify-content:space-between;align-items:center;margin-top:30px;flex-wrap:wrap;gap:10px;}
  .status-note{font-size:11.5px;color:var(--muted);}
  .loading{padding:60px 0;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ DATA ============ */
const VERTICALS = {
  campo: {
    id:'campo', name:'Serviço de Campo', color:'var(--campo)', chip:'#5c8f3a',
    tagline:'Como transformar dados e presença de campo em produtos, rotas mais inteligentes e novas fontes de receita.',
    team:['Suzana Miranda','Márcio Renan','Aderaldo Roberto','Heitor Diniz','Carlos Eduardo','Paulo Everton','Israelly Viana']
  },
  cobranca: {
    id:'cobranca', name:'Cobrança', color:'var(--cobranca)', chip:'#1c4a30',
    tagline:'Como elevar recuperação, reduzir custo por contato e criar novas soluções de cobrança dentro e fora do portfólio.',
    team:['João Lucas Sousa','Leandro Silva','Marcus Vinicius','Raul Lindraz','Luciana','Bruno Lima','Allan John']
  },
  relacionamento: {
    id:'relacionamento', name:'Relacionamento Inteligente', color:'var(--relacionamento)', chip:'#c7dd4f',
    tagline:'Como usar IA e automação para reduzir custo de atendimento, atacar a causa raiz do contato e melhorar a experiência do cliente.',
    team:['Clarisse Ellen','Wilson Gomes','Ezequiel Moreira','Nayana Gadelha','Amanda Stringhi','Lucas Albuquerque','Wesley Galdino']
  }
};

const CRITERIA = [
  {key:'impacto', label:'Impacto da Ideia', max:40, color:'var(--c-impacto)',
    tiers:['Ideia genérica, já existe no mercado','Boa ideia, alguma diferenciação','Ideia original, transformadora e escalável']},
  {key:'viabilidade', label:'Viabilidade', max:25, color:'var(--c-viabilidade)',
    tiers:['Sem caminho claro, alto custo','Futuro MVP possível, mas com dependências','Desenvolvimento simples e testável em 30 dias']},
  {key:'estrategia', label:'Estratégia de Negócio', max:20, color:'var(--c-estrategia)',
    tiers:['Desalinhado ou ROI indefinido','Alinhado, ROI estimado','Conectado à estratégia com ROI claro']},
  {key:'inovacao', label:'Inovação', max:15, color:'var(--c-inovacao)',
    tiers:['Sem diferencial inovador','Alguma inovação incremental','Ruptura com modelo atual do setor']},
  {key:'risco', label:'Risco', max:5, color:'var(--c-risco)',
    tiers:['Alto risco regulatório ou técnico','Riscos gerenciáveis','Baixo risco, caminho claro']}
];

const AWARD_DEFS = [
  {id:'impacto_maximo', name:'Impacto Máximo', color:'#9fe63d',
    desc:'Para a ideia com maior potencial de receita ou redução de custo — a que acertou em tudo.', type:'auto', metric:'total'},
  {id:'maos_obra', name:'Mãos à Obra', color:'var(--c-viabilidade)',
    desc:'Para o MVP mais prático e pronto para testar em 30 dias.', type:'auto', metric:'viabilidade'},
  {id:'golpe_mestre', name:'Golpe de Mestre', color:'var(--c-estrategia)',
    desc:'Para a ideia que entrega mais valor com o menor investimento.', type:'auto', metric:'estrategia'},
  {id:'mente_disruptiva', name:'Mente Disruptiva', color:'var(--c-inovacao)',
    desc:'Para a ideia mais original e que rompe com o padrão.', type:'auto', metric:'inovacao'},
  {id:'pitch_show', name:'Pitch Show', color:'#e0c33a',
    desc:'Para o pitch mais envolvente, claro e convincente — escolha da banca.', type:'manual-idea'},
  {id:'inteligencia_coletiva', name:'Inteligência Coletiva', color:'#4fb3d9',
    desc:'Para a equipe com melhor integração e construção colaborativa — escolha da banca.', type:'manual-team'}
];

/* ============ STATE ============ */
let state = { tab:'campo', ideas:[], awards:{pitchShowId:null, coletivaVertical:null}, expandedId:null, loaded:false };

/* ============ STORAGE ============ */
async function loadAll(){
  try{
    const r = await window.storage.get('ideas', true);
    state.ideas = r ? JSON.parse(r.value) : [];
  }catch(e){ state.ideas = []; }
  try{
    const r2 = await window.storage.get('awards-manual', true);
    state.awards = r2 ? JSON.parse(r2.value) : {pitchShowId:null, coletivaVertical:null};
  }catch(e){ state.awards = {pitchShowId:null, coletivaVertical:null}; }
  state.loaded = true;
  render();
}
async function saveIdeas(){
  try{ await window.storage.set('ideas', JSON.stringify(state.ideas), true); }catch(e){ console.error('storage error', e); }
}
async function saveAwards(){
  try{ await window.storage.set('awards-manual', JSON.stringify(state.awards), true); }catch(e){ console.error('storage error', e); }
}

/* ============ HELPERS ============ */
function uid(){ return 'idea_' + Math.random().toString(36).slice(2,10); }
function totalOf(idea){ return CRITERIA.reduce((s,c)=>s+(idea.scores[c.key]||0),0); }
function tierText(crit, val){
  const pct = val / crit.max;
  if(pct < 0.45) return crit.tiers[0];
  if(pct < 0.75) return crit.tiers[1];
  return crit.tiers[2];
}
function ringSVG(idea){
  const total = totalOf(idea), pct = total/100;
  const r = 24, c = 2*Math.PI*r, off = c*(1-pct);
  return `<div class="ring-wrap">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="5"/>
      <circle id="ringc-${idea.id}" cx="28" cy="28" r="${r}" fill="none" stroke="var(--lime)" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .2s ease"/>
    </svg>
    <div class="ring-total" id="ringt-${idea.id}">${total}</div>
  </div>`;
}
function autoWinners(metric){
  const pool = state.ideas.filter(i => Object.values(i.scores).some(v=>v>0));
  if(pool.length===0) return [];
  const val = i => metric==='total' ? totalOf(i) : (i.scores[metric]||0);
  const max = Math.max(...pool.map(val));
  if(max===0) return [];
  let winners = pool.filter(i => val(i)===max);
  if(winners.length>1){
    // tiebreak: impacto desc, then viabilidade desc
    winners.sort((a,b)=> (b.scores.impacto - a.scores.impacto) || (b.scores.viabilidade - a.scores.viabilidade));
    const topImpacto = winners[0].scores.impacto, topViab = winners[0].scores.viabilidade;
    winners = winners.filter(w => w.scores.impacto===topImpacto && w.scores.viabilidade===topViab);
  }
  return winners;
}

/* ============ RENDER ============ */
function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = `<div class="loading">Carregando painel da banca…</div>`;
    return;
  }
  app.innerHTML = `
    <div class="topbar">
      <div class="radar-sweep"><div class="sweep-line"></div></div>
      <div class="brand">
        ${logoSVG()}
        <div class="brand-text">
          <h1>Radar de <span>Soluções</span></h1>
          <p>Painel de avaliação da Banca · Meireles &amp; Freitas</p>
        </div>
      </div>
    </div>
    <nav class="tabs">
      ${Object.values(VERTICALS).map(v => tabBtn(v.id, v.name, v.chip)).join('')}
      ${tabBtn('geral','Painel Geral','#9fe63d')}
    </nav>
    <div id="content"></div>
  `;
  const content = document.getElementById('content');
  if(state.tab === 'geral') content.innerHTML = renderGeral();
  else content.innerHTML = renderVertical(state.tab);
  attachHandlers();
}
function tabBtn(id,label,color){
  const active = state.tab===id ? 'active' : '';
  return `<button class="tab-btn ${active}" data-tab="${id}"><span class="tab-dot" style="background:${color}"></span>${label}</button>`;
}
function logoSVG(){
  return `<svg width="46" height="46" viewBox="0 0 46 46" fill="none">
    <circle cx="23" cy="23" r="19" stroke="#9fe63d" stroke-width="2.4"/>
    <circle cx="23" cy="23" r="12" stroke="#9fe63d" stroke-width="2.4"/>
    <circle cx="23" cy="23" r="5" stroke="#9fe63d" stroke-width="2.4"/>
    <line x1="4" y1="23" x2="42" y2="23" stroke="#9fe63d" stroke-width="2.4"/>
    <circle cx="34" cy="10" r="2.4" fill="#9fe63d"/>
    <circle cx="12" cy="36" r="2.4" fill="#9fe63d"/>
  </svg>`;
}

function renderVertical(vid){
  const v = VERTICALS[vid];
  const ideas = state.ideas.filter(i=>i.vertical===vid).sort((a,b)=>totalOf(b)-totalOf(a));
  const top = ideas[0];
  return `
    <div class="v-hero" style="background:linear-gradient(135deg, ${v.color}, rgba(0,0,0,0.35)); border-color:${v.color}55;">
      <h2>${v.name}</h2>
      <p class="tagline">${v.tagline}</p>
      <div class="team-chips">${v.team.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
    </div>
    <div class="v-actions">
      <button class="btn btn-primary" id="btn-new-idea">+ Nova ideia</button>
      <div class="mini-rank">${top ? `Líder da vertical: <b>${esc(top.name)}</b> · ${totalOf(top)}/100` : 'Nenhuma ideia pontuada ainda'}</div>
    </div>
    <div id="new-idea-slot"></div>
    ${ideas.length ? `<div class="idea-grid">${ideas.map(i=>renderIdeaCard(i)).join('')}</div>`
      : `<div class="empty-state">Nenhuma ideia cadastrada para ${v.name} ainda. Clique em "+ Nova ideia" para começar a avaliar um pitch.</div>`}
  `;
}

function renderIdeaCard(idea){
  const expanded = state.expandedId === idea.id;
  const nominee = idea.pitchShowNominee ? 'active' : '';
  return `
  <div class="idea-card" data-id="${idea.id}">
    <div class="idea-card-top" data-toggle="${idea.id}">
      <div>
        <p class="idea-name">${esc(idea.name)}</p>
        <div class="idea-meta">
          <span class="day-badge">Dia ${idea.day}</span>
          <span>${VERTICALS[idea.vertical].name}</span>
        </div>
      </div>
      ${ringSVG(idea)}
    </div>
    ${expanded ? renderExpandPanel(idea) : ''}
    <div class="card-footer" style="margin-top:${expanded?'0':'12px'}">
      <label class="nominee-toggle">
        <button class="star-btn ${nominee}" data-nominee="${idea.id}" title="Indicar para Pitch Show">★</button>
        Indicar para Pitch Show
      </label>
      <button class="btn btn-danger" data-delete="${idea.id}" style="padding:6px 12px;font-size:11.5px;">Remover</button>
    </div>
  </div>`;
}

function renderExpandPanel(idea){
  return `<div class="expand-panel">
    ${CRITERIA.map(c => {
      const val = idea.scores[c.key]||0;
      return `<div class="crit-row crit-${c.key}">
        <label><span><span class="stripe" style="background:${c.color}"></span>${c.label}</span><span class="pts">${val}/${c.max}</span></label>
        <input type="range" min="0" max="${c.max}" value="${val}" data-idea="${idea.id}" data-crit="${c.key}" data-max="${c.max}">
        <div class="hint" data-hint="${idea.id}-${c.key}">${tierText(c, val)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderGeral(){
  const ranked = [...state.ideas].filter(i=>Object.values(i.scores).some(v=>v>0)).sort((a,b)=>totalOf(b)-totalOf(a));
  const pitchNominees = state.ideas.filter(i=>i.pitchShowNominee);

  const awardCards = AWARD_DEFS.map(def=>{
    let inner = '';
    if(def.type==='auto'){
      const winners = autoWinners(def.metric);
      inner = winners.length
        ? winners.map(w=>`<div class="winner-block" style="margin-bottom:6px;">
            <div class="winner-name">${esc(w.name)}</div>
            <div class="winner-sub">${VERTICALS[w.vertical].name} · ${def.metric==='total'?totalOf(w):w.scores[def.metric]}${def.metric==='total'?'/100':'/'+CRITERIA.find(c=>c.key===def.metric).max}</div>
          </div>`).join('')
        : `<div class="no-winner">Ainda sem pontuações suficientes.</div>`;
    } else if(def.type==='manual-idea'){
      inner = `<select class="pick" data-award-idea>
          <option value="">— selecionar pitch vencedor —</option>
          ${pitchNominees.map(n=>`<option value="${n.id}" ${state.awards.pitchShowId===n.id?'selected':''}>${esc(n.name)} · ${VERTICALS[n.vertical].name}</option>`).join('')}
        </select>
        ${pitchNominees.length===0 ? `<div class="no-winner" style="margin-top:8px;">Nenhum pitch indicado ainda — marque com ★ nos cards das verticais.</div>`
          : (state.awards.pitchShowId ? winnerBlockFromId(state.awards.pitchShowId) : '')}`;
    } else if(def.type==='manual-team'){
      inner = `<select class="pick" data-award-team>
          <option value="">— selecionar equipe vencedora —</option>
          ${Object.values(VERTICALS).map(v=>`<option value="${v.id}" ${state.awards.coletivaVertical===v.id?'selected':''}>${v.name}</option>`).join('')}
        </select>
        ${state.awards.coletivaVertical ? `<div class="winner-block" style="margin-top:8px;"><div class="winner-name">${VERTICALS[state.awards.coletivaVertical].name}</div></div>` : ''}`;
    }
    return `<div class="award-card" style="--aw-color:${def.color}">
      <span class="award-value-tag">R$ 500,00</span>
      <h4>${def.name}</h4>
      <p class="award-desc">${def.desc}</p>
      ${inner}
    </div>`;
  }).join('');

  const rankRows = ranked.map((i,idx)=>`
    <tr>
      <td class="pos">${idx+1}º</td>
      <td>${esc(i.name)}</td>
      <td><span class="v-tag" style="background:${VERTICALS[i.vertical].chip}55;border:1px solid ${VERTICALS[i.vertical].chip}">${VERTICALS[i.vertical].name}</span></td>
      <td>${i.scores.impacto}</td>
      <td>${i.scores.viabilidade}</td>
      <td>${i.scores.estrategia}</td>
      <td>${i.scores.inovacao}</td>
      <td>${i.scores.risco}</td>
      <td style="font-weight:700;color:var(--lime-soft)">${totalOf(i)}</td>
    </tr>`).join('');

  return `
    <div class="panel-section">
      <h3>Premiação</h3>
      <p class="sub">Quatro categorias calculadas automaticamente pela Matriz de Análise, duas de escolha livre da banca.</p>
      <div class="award-grid">${awardCards}</div>
    </div>
    <div class="panel-section">
      <h3>Ranking geral</h3>
      <p class="sub">Todas as ideias pontuadas, das três verticais, ordenadas por pontuação total (máx. 100).</p>
      ${ranked.length ? `<div style="overflow-x:auto;"><table class="rank-table">
        <thead><tr><th>#</th><th>Ideia</th><th>Vertical</th><th>Impacto</th><th>Viabilidade</th><th>Estratégia</th><th>Inovação</th><th>Risco</th><th>Total</th></tr></thead>
        <tbody>${rankRows}</tbody>
      </table></div>` : `<div class="empty-state">Nenhuma ideia pontuada ainda em nenhuma vertical.</div>`}
    </div>
    <div class="footer-actions">
      <span class="status-note">Dados salvos e visíveis para todos os analistas com acesso a este painel.</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="btn-refresh">Atualizar dados</button>
        <button class="btn btn-danger" id="btn-reset">Zerar avaliações</button>
      </div>
    </div>
  `;
}
function winnerBlockFromId(id){
  const w = state.ideas.find(i=>i.id===id);
  if(!w) return '';
  return `<div class="winner-block" style="margin-top:8px;"><div class="winner-name">${esc(w.name)}</div><div class="winner-sub">${VERTICALS[w.vertical].name}</div></div>`;
}
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============ EVENTS ============ */
function attachHandlers(){
  document.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick = ()=>{ state.tab = b.dataset.tab; state.expandedId=null; render(); };
  });

  const newBtn = document.getElementById('btn-new-idea');
  if(newBtn) newBtn.onclick = ()=>{
    const slot = document.getElementById('new-idea-slot');
    slot.innerHTML = `<div class="new-idea-form">
      <div class="field"><label>Nome do produto / serviço</label><input type="text" id="ni-name" placeholder="Ex: Rota Inteligente 2.0"></div>
      <div class="field"><label>Dia</label>
        <select id="ni-day"><option value="1">Dia 1 · 16/07</option><option value="2">Dia 2 · 23/07</option></select>
      </div>
      <button class="btn btn-primary" id="ni-save">Adicionar ideia</button>
      <button class="btn btn-ghost" id="ni-cancel">Cancelar</button>
    </div>`;
    document.getElementById('ni-cancel').onclick = ()=>{ slot.innerHTML=''; };
    document.getElementById('ni-save').onclick = async ()=>{
      const name = document.getElementById('ni-name').value.trim();
      if(!name) return;
      const day = document.getElementById('ni-day').value;
      const idea = {id:uid(), vertical:state.tab, name, day, pitchShowNominee:false,
        scores:{impacto:0,viabilidade:0,estrategia:0,inovacao:0,risco:0}};
      state.ideas.push(idea);
      state.expandedId = idea.id;
      await saveIdeas();
      render();
    };
  };

  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.dataset.toggle;
      state.expandedId = state.expandedId===id ? null : id;
      render();
    };
  });

  document.querySelectorAll('[data-delete]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const id = el.dataset.delete;
      state.ideas = state.ideas.filter(i=>i.id!==id);
      if(state.expandedId===id) state.expandedId=null;
      await saveIdeas();
      render();
    };
  });

  document.querySelectorAll('[data-nominee]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const id = el.dataset.nominee;
      const idea = state.ideas.find(i=>i.id===id);
      idea.pitchShowNominee = !idea.pitchShowNominee;
      await saveIdeas();
      render();
    };
  });

  document.querySelectorAll('input[type=range][data-idea]').forEach(slider=>{
    slider.oninput = ()=>{
      const id = slider.dataset.idea, key = slider.dataset.crit;
      const idea = state.ideas.find(i=>i.id===id);
      idea.scores[key] = parseInt(slider.value,10);
      // live-update label, hint, ring without full rerender
      const row = slider.closest('.crit-row');
      row.querySelector('.pts').textContent = `${idea.scores[key]}/${slider.dataset.max}`;
      const crit = CRITERIA.find(c=>c.key===key);
      row.querySelector('.hint').textContent = tierText(crit, idea.scores[key]);
      const total = totalOf(idea);
      const ringt = document.getElementById(`ringt-${id}`);
      const ringc = document.getElementById(`ringc-${id}`);
      if(ringt) ringt.textContent = total;
      if(ringc){
        const r=24, c=2*Math.PI*r;
        ringc.setAttribute('stroke-dashoffset', c*(1-total/100));
      }
    };
    slider.onchange = async ()=>{ await saveIdeas(); };
  });

  const refreshBtn = document.getElementById('btn-refresh');
  if(refreshBtn) refreshBtn.onclick = ()=>{ state.loaded=false; render(); loadAll(); };

  const resetBtn = document.getElementById('btn-reset');
  if(resetBtn) resetBtn.onclick = async ()=>{
    if(!confirm('Isso vai apagar todas as ideias e pontuações registradas para todos os analistas. Confirmar?')) return;
    state.ideas = [];
    state.awards = {pitchShowId:null, coletivaVertical:null};
    await saveIdeas();
    await saveAwards();
    render();
  };

  const awardIdeaSel = document.querySelector('[data-award-idea]');
  if(awardIdeaSel) awardIdeaSel.onchange = async ()=>{
    state.awards.pitchShowId = awardIdeaSel.value || null;
    await saveAwards();
    render();
  };
  const awardTeamSel = document.querySelector('[data-award-team]');
  if(awardTeamSel) awardTeamSel.onchange = async ()=>{
    state.awards.coletivaVertical = awardTeamSel.value || null;
    await saveAwards();
    render();
  };
}

loadAll();
</script>
</body>
</html>
