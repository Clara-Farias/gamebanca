<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

#radar-app {
  --bg: #071f16;
  --panel: #0d3325;
  --panel-2: #123d2c;
  --line: #1d5a40;
  --accent: #9fe23d;
  --accent-soft: rgba(159,226,61,0.16);
  --teal: #5fe38a;
  --teal-soft: rgba(95,227,138,0.14);
  --danger: #e2574c;
  --text: #f2faf5;
  --muted: #8fb39d;
  --radius: 10px;
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg);
  min-height: 100%;
  padding: 0;
  margin: 0;
  -webkit-font-smoothing: antialiased;
}
#radar-app * { box-sizing: border-box; }
#radar-app h1, #radar-app h2, #radar-app h3, #radar-app .disp {
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: -0.01em;
}
#radar-app .wrap { max-width: 1080px; margin: 0 auto; padding: 18px 16px 60px; }

#radar-app .hero {
  position: relative;
  overflow: hidden;
  background: radial-gradient(120% 160% at 15% 0%, #123f2c 0%, #071f16 60%);
  border-bottom: 1px solid var(--line);
  padding: 22px 16px 16px;
}
#radar-app .hero::before {
  content: '';
  position: absolute;
  top: -140px; right: -120px;
  width: 340px; height: 340px;
  border-radius: 50%;
  border: 1px solid rgba(159,226,61,0.22);
  background: conic-gradient(from 0deg, rgba(159,226,61,0.4), transparent 28%);
  animation: radar-spin 6s linear infinite;
  opacity: 0.55;
}
#radar-app .hero::after {
  content: '';
  position: absolute;
  top: -140px; right: -120px;
  width: 340px; height: 340px;
  border-radius: 50%;
  box-shadow: inset 0 0 0 1px rgba(159,226,61,0.12), inset 0 0 0 70px rgba(159,226,61,0.05);
}
@keyframes radar-spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { #radar-app .hero::before { animation: none; } }

#radar-app .hero-inner { max-width: 1080px; margin: 0 auto; position: relative; z-index: 1; }
#radar-app .eyebrow { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin: 0 0 6px; }
#radar-app h1 { font-size: 26px; margin: 0 0 4px; font-weight: 700; }
#radar-app .hero p { margin: 0; color: var(--muted); font-size: 14px; }
#radar-app .db-badge { display: inline-flex; align-items:center; gap:5px; font-size: 11px; color: var(--teal); font-weight: 700; margin-top: 8px; }
#radar-app .db-badge .dot { width:6px; height:6px; border-radius:50%; background: var(--teal); }
#radar-app .db-badge.offline { color: var(--danger); }
#radar-app .db-badge.offline .dot { background: var(--danger); }

#radar-app .tabs { display: flex; gap: 6px; overflow-x: auto; margin-top: 18px; padding-bottom: 2px; -ms-overflow-style: none; scrollbar-width: none; }
#radar-app .tabs::-webkit-scrollbar { display: none; }
#radar-app .tab {
  flex: 0 0 auto;
  padding: 9px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--muted);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s ease;
}
#radar-app .tab:hover { color: var(--text); border-color: #3a4660; }
#radar-app .tab.active { background: var(--accent); color: #072215; border-color: var(--accent); }

#radar-app .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-top: 16px; }
#radar-app .panel + .panel { margin-top: 14px; }
#radar-app .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
#radar-app label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
#radar-app input[type=text], #radar-app input[type=number], #radar-app select {
  background: var(--panel-2);
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 10px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
}
#radar-app input:focus, #radar-app select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
#radar-app .field { min-width: 140px; flex: 1; }
#radar-app .field.small { max-width: 90px; flex: 0 0 90px; }
#radar-app button.btn {
  background: var(--accent);
  color: #072215;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-weight: 700;
  font-size: 13.5px;
  cursor: pointer;
  font-family: inherit;
}
#radar-app button.btn:hover { filter: brightness(1.06); }
#radar-app button.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); font-weight: 600; }
#radar-app button.btn.danger { background: transparent; color: var(--danger); border: 1px solid rgba(226,87,76,0.4); }
#radar-app button.btn:disabled { opacity: 0.5; cursor: not-allowed; }

#radar-app table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
#radar-app th { text-align: left; color: var(--muted) !important; font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 8px; border-bottom: 1px solid var(--line); }
#radar-app td { padding: 9px 8px; border-bottom: 1px solid #16442f; vertical-align: middle; color: var(--text) !important; }
#radar-app tr:last-child td { border-bottom: none; }
#radar-app .muted { color: var(--muted) !important; text-decoration: none !important; }
#radar-app a { color: inherit !important; text-decoration: none !important; }
#radar-app td, #radar-app th, #radar-app span, #radar-app div { text-decoration: none; }
#radar-app .score-num { color: #ffffff !important; }
#radar-app .tag { display: inline-block; padding: 2px 9px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); font-size: 11.5px; color: var(--muted); }
#radar-app .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
#radar-app .empty .big { font-size: 30px; margin-bottom: 8px; }

#radar-app .idea-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
#radar-app .idea-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
#radar-app .idea-name { font-weight: 700; font-size: 15px; }
#radar-app .idea-meta { margin-top: 3px; display: flex; gap: 6px; }
#radar-app .score-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
#radar-app .score-grid .field { min-width: 0; }
#radar-app .score-cap { font-size: 10.5px; color: var(--muted); font-weight: 400; }
#radar-app .status-pill { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
#radar-app .status-pill.done { background: var(--teal-soft); color: var(--teal); }
#radar-app .status-pill.pending { background: var(--panel); color: var(--muted); border: 1px solid var(--line); }
#radar-app .idea-total { font-family: 'Space Grotesk'; font-weight: 700; font-size: 15px; }

#radar-app .rank-pos { font-family: 'Space Grotesk'; font-weight: 700; color: var(--muted); font-size: 14px; width: 26px; }
#radar-app .rank-pos.top1 { color: var(--accent); }
#radar-app .award-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 12px; }
#radar-app .award-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
#radar-app .award-title { font-weight: 700; font-size: 14.5px; display: flex; align-items: center; gap: 6px; }
#radar-app .award-prize { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 2px; }
#radar-app .award-desc { font-size: 12.5px; color: var(--muted); margin: 6px 0 10px; }
#radar-app .award-winner { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; }
#radar-app .award-winner .name { font-weight: 700; font-size: 14px; }
#radar-app .award-winner .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
#radar-app .award-empty { color: var(--muted); font-size: 12.5px; font-style: italic; }

#radar-app .help-toggle { background: none; border: none; color: var(--accent); font-size: 12.5px; font-weight: 700; cursor: pointer; padding: 0; margin-top: 12px; }
#radar-app .help-box { margin-top: 10px; font-size: 12.5px; color: var(--muted); line-height: 1.6; }
#radar-app .help-box b { color: var(--text); }
#radar-app .top-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
#radar-app .refresh-note { font-size: 11.5px; color: var(--muted); }
#radar-app .error-banner { background: rgba(226,87,76,0.12); border: 1px solid rgba(226,87,76,0.35); color: #ff9c92; border-radius: 8px; padding: 10px 12px; font-size: 12.5px; margin-top: 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }

/* Cerimônia de premiação */
#radar-app .ceremony-stage {
  text-align: center;
  padding: 48px 24px 40px;
  position: relative;
  overflow: hidden;
  background: radial-gradient(90% 140% at 50% -10%, #123f2c 0%, #0d3325 65%);
}
#radar-app .ceremony-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 14px; }
#radar-app .ceremony-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); transition: all .2s ease; }
#radar-app .ceremony-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }
#radar-app .ceremony-count { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 18px; }
#radar-app .ceremony-badge { font-size: 44px; margin-bottom: 6px; filter: drop-shadow(0 0 18px rgba(159,226,61,0.45)); }
#radar-app .ceremony-title { font-size: 30px; font-weight: 700; margin-bottom: 4px; }
#radar-app .ceremony-prize { color: var(--accent); font-weight: 700; font-size: 14px; margin-bottom: 10px; }
#radar-app .ceremony-desc { color: var(--muted); font-size: 14px; max-width: 460px; margin: 0 auto 28px; line-height: 1.5; }
#radar-app .ceremony-reveal-btn { font-size: 15px; padding: 14px 30px; box-shadow: 0 0 0 0 rgba(159,226,61,0.5); animation: ceremony-pulse 2.2s ease-in-out infinite; }
@keyframes ceremony-pulse {
  0% { box-shadow: 0 0 0 0 rgba(159,226,61,0.45); }
  70% { box-shadow: 0 0 0 16px rgba(159,226,61,0); }
  100% { box-shadow: 0 0 0 0 rgba(159,226,61,0); }
}
#radar-app .ceremony-winner-box { background: var(--panel-2); border: 1px solid var(--accent); border-radius: 14px; padding: 26px 20px; max-width: 480px; margin: 0 auto; box-shadow: 0 0 40px rgba(159,226,61,0.18); }
#radar-app .ceremony-winner-label { font-size: 11.5px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; margin-bottom: 8px; }
#radar-app .ceremony-winner-name { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 700; line-height: 1.2; }
#radar-app .ceremony-winner-sub { color: var(--muted); font-size: 13px; margin-top: 8px; }
#radar-app .reveal-in { animation: ceremony-reveal .5s cubic-bezier(.2,.9,.3,1.3); }
@keyframes ceremony-reveal {
  0% { opacity: 0; transform: scale(0.85) translateY(8px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
#radar-app .ceremony-nav { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
#radar-app:fullscreen { display: flex; align-items: center; }
#radar-app:fullscreen .hero { display: none; }
#radar-app:fullscreen .wrap { width: 100%; }

@media (max-width: 640px) {
  #radar-app .score-grid { grid-template-columns: repeat(3, 1fr); }
  #radar-app .hero::before, #radar-app .hero::after { width: 220px; height: 220px; top: -90px; right: -80px; }
  #radar-app .ceremony-title { font-size: 24px; }
  #radar-app .ceremony-winner-name { font-size: 24px; }
}
</style>

// ---------- supabase REST helper (com retry automático) ----------
async function sb(path, options, attempt) {
  options = options || {};
  attempt = attempt || 1;
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method: options.method || 'GET',
      headers: Object.assign({
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
      }, options.headers || {}),
      body: options.body,
    });
    if (!res.ok) {
      const t = await res.text().catch(function(){ return ''; });
      throw new Error('HTTP ' + res.status + ' ' + t);
    }
    const text = await res.text();
    if (!text) return { ok: true, data: null };
    const data = JSON.parse(text);
    return { ok: true, data: data };
  } catch (e) {
    console.error('supabase request failed', path, e);
    if (attempt < 3) {
      await new Promise(function(r){ setTimeout(r, 1000 * attempt); });
      return sb(path, options, attempt + 1);
    }
    return { ok: false, data: null };
  }
}

function setDbBadge(online) {
  $dbBadge.className = 'db-badge' + (online ? '' : ' offline');
  $dbBadgeText.textContent = online ? 'conectado ao banco de dados' : 'sem conexão com o banco — tentando de novo';
}

async function loadAll() {
  const results = await Promise.all([
    sb('ideas?select=*&order=created_at.asc'),
    sb('scores?select=*'),
    sb('manual_awards?select=*'),
  ]);
  const ideasRes = results[0], scoresRes = results[1], awardsRes = results[2];
  const allOk = ideasRes.ok && scoresRes.ok && awardsRes.ok;
  if (allOk) {
    ideas = ideasRes.data.map(function(r) { return { id: r.id, name: r.name, vertical: r.vertical || '', day: r.day || 1 }; });
    const s = {};
    ANALYSTS.forEach(function(a) { s[a.key] = {}; });
    scoresRes.data.forEach(function(r) {
      if (!s[r.analyst_key]) s[r.analyst_key] = {};
      s[r.analyst_key][r.idea_id] = {
        impacto: r.impacto !== null && r.impacto !== undefined ? Number(r.impacto) : '',
        viabilidade: r.viabilidade !== null && r.viabilidade !== undefined ? Number(r.viabilidade) : '',
        estrategia: r.estrategia !== null && r.estrategia !== undefined ? Number(r.estrategia) : '',
        inovacao: r.inovacao !== null && r.inovacao !== undefined ? Number(r.inovacao) : '',
        risco: r.risco !== null && r.risco !== undefined ? Number(r.risco) : '',
      };
    });
    scores = s;
    const ma = { pitchShow: '', inteligenciaColetiva: '' };
    awardsRes.data.forEach(function(r) {
      if (r.key === 'pitch_show') ma.pitchShow = r.value || '';
      if (r.key === 'inteligencia_coletiva') ma.inteligenciaColetiva = r.value || '';
    });
    manualAwards = ma;
    lastLoadError = false;
  } else {
    lastLoadError = true;
  }
  loaded = true;
  setDbBadge(allOk);
}

// ---------- domain logic ----------
function ideaEntries(ideaId) {
  return ANALYSTS
    .map(function(a) { return scores[a.key] ? scores[a.key][ideaId] : undefined; })
    .filter(function(e) { return e && CRITERIA.some(function(c) { return e[c.key] !== undefined && e[c.key] !== ''; }); });
}

function computeRanking() {
  return ideas
    .filter(function(i) { return i.name && i.name.trim(); })
    .map(function(idea) {
      const entries = ideaEntries(idea.id);
      const banca = entries.length;
      const avg = {};
      CRITERIA.forEach(function(c) {
        avg[c.key] = banca ? entries.reduce(function(sum, e) { return sum + (Number(e[c.key]) || 0); }, 0) / banca : 0;
      });
      const total = CRITERIA.reduce(function(sum, c) { return sum + avg[c.key]; }, 0);
      return Object.assign({}, idea, { avg: avg, total: total, banca: banca });
    })
    .filter(function(r) { return r.banca > 0; })
    .sort(function(a, b) { return b.total - a.total || b.avg.impacto - a.avg.impacto || b.avg.viabilidade - a.avg.viabilidade; });
}

function computeAutoAward(criterionKey, ranked) {
  if (!ranked.length) return null;
  const sorted = ranked.slice().sort(function(a, b) {
    return b.avg[criterionKey] - a.avg[criterionKey] || b.avg.impacto - a.avg.impacto || b.avg.viabilidade - a.avg.viabilidade;
  });
  return sorted[0];
}

function ceremonyAwardsList() {
  const ranked = computeRanking();
  const auto = AUTO_AWARDS.map(function(award) {
    const winner = computeAutoAward(award.key, ranked);
    const crit = CRITERIA.filter(function(c){ return c.key === award.key; })[0];
    return {
      title: award.title,
      desc: award.desc,
      prize: PRIZE,
      ready: !!winner,
      winnerName: winner ? winner.name : '',
      winnerSub: winner ? ((winner.vertical || '—') + ' · ' + crit.label + ': ' + fmt(winner.avg[award.key]) + '/' + crit.max) : '',
    };
  });
  const manual = [
    {
      title: 'Pitch Show',
      desc: 'Para o pitch mais envolvente, claro e convincente — escolha da banca.',
      prize: PRIZE,
      ready: !!(manualAwards.pitchShow && manualAwards.pitchShow.trim()),
      winnerName: manualAwards.pitchShow || '',
      winnerSub: 'Escolha da banca',
    },
    {
      title: 'Inteligência Coletiva',
      desc: 'Para a equipe com melhor integração e construção colaborativa — escolha da banca.',
      prize: PRIZE,
      ready: !!(manualAwards.inteligenciaColetiva && manualAwards.inteligenciaColetiva.trim()),
      winnerName: manualAwards.inteligenciaColetiva || '',
      winnerSub: 'Escolha da banca',
    },
  ];
  return auto.concat(manual);
}

function fmt(n) {
  const v = Math.round(n * 100) / 100;
  return (v % 1 === 0) ? String(v) : String(v).replace('.', ',');
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(m) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
  });
}
function radarSvg(avg, size) {
  size = size || 46;
  const c = size / 2, r = size / 2 - 4;
  const pts = CRITERIA.map(function(crit, i) {
    const frac = Math.max(0, Math.min(1, avg[crit.key] / crit.max));
    const angle = -Math.PI / 2 + i * (2 * Math.PI / CRITERIA.length);
    return [c + Math.cos(angle) * r * frac, c + Math.sin(angle) * r * frac];
  });
  const outline = CRITERIA.map(function(crit, i) {
    const angle = -Math.PI / 2 + i * (2 * Math.PI / CRITERIA.length);
    return [c + Math.cos(angle) * r, c + Math.sin(angle) * r];
  });
  const poly = pts.map(function(p){ return p.join(','); }).join(' ');
  const outPoly = outline.map(function(p){ return p.join(','); }).join(' ');
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<polygon points="' + outPoly + '" fill="none" stroke="#1d5a40" stroke-width="1"/>' +
    '<polygon points="' + poly + '" fill="rgba(159,226,61,0.35)" stroke="#9fe23d" stroke-width="1.3"/>' +
    '</svg>';
}

// ---------- backup export ----------
function csvCell(v) {
  const s = v === undefined || v === null ? '' : String(v);
  return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function csvRow(arr) { return arr.map(csvCell).join(',') + '\n'; }
function buildBackupCsv() {
  const ranked = computeRanking();
  let out = '';
  out += 'RADAR DE SOLUCOES - BACKUP\n';
  out += csvRow(['Gerado em', new Date().toLocaleString('pt-BR')]);
  out += '\n';
  out += 'IDEIAS CADASTRADAS\n';
  out += csvRow(['#', 'Nome da Ideia', 'Vertical', 'Dia']);
  ideas.forEach(function(idea, idx) { out += csvRow([idx + 1, idea.name, idea.vertical || '', idea.day || 1]); });
  out += '\n';
  ANALYSTS.forEach(function(a) {
    out += 'NOTAS - ' + a.name.toUpperCase() + '\n';
    out += csvRow(['Nome da Ideia', 'Vertical', 'Dia'].concat(CRITERIA.map(function(c){ return c.label + ' (0-' + c.max + ')'; })).concat(['Total']));
    ideas.forEach(function(idea) {
      const s = (scores[a.key] || {})[idea.id] || {};
      const hasAny = CRITERIA.some(function(c) { return s[c.key] !== undefined && s[c.key] !== ''; });
      if (!hasAny) return;
      const total = CRITERIA.reduce(function(sum, c) { return sum + (Number(s[c.key]) || 0); }, 0);
      out += csvRow([idea.name, idea.vertical || '', idea.day || 1].concat(CRITERIA.map(function(c){ return s[c.key] !== undefined ? s[c.key] : ''; })).concat([fmt(total)]));
    });
    out += '\n';
  });
  out += 'RANKING GERAL\n';
  out += csvRow(['Posicao', 'Ideia', 'Vertical'].concat(CRITERIA.map(function(c){ return c.label; })).concat(['Total', 'Banca']));
  ranked.forEach(function(r, idx) {
    out += csvRow([idx + 1, r.name, r.vertical || ''].concat(CRITERIA.map(function(c){ return fmt(r.avg[c.key]); })).concat([fmt(r.total), r.banca + '/' + ANALYSTS.length]));
  });
  out += '\n';
  out += 'PREMIACOES\n';
  out += csvRow(['Categoria', 'Premio', 'Ideia Vencedora', 'Vertical', 'Criterio', 'Nota']);
  AUTO_AWARDS.forEach(function(award) {
    const winner = computeAutoAward(award.key, ranked);
    const crit = CRITERIA.filter(function(c){ return c.key === award.key; })[0];
    out += csvRow([award.title, PRIZE, winner ? winner.name : '', winner ? (winner.vertical || '') : '', crit.label, winner ? fmt(winner.avg[award.key]) + '/' + crit.max : '']);
  });
  out += csvRow(['Pitch Show', PRIZE, manualAwards.pitchShow || '', '', 'Escolha da banca', '']);
  out += csvRow(['Inteligência Coletiva', PRIZE, manualAwards.inteligenciaColetiva || '', '', 'Escolha da banca', '']);
  return out;
}
function downloadBackupCsv() {
  const csv = '\uFEFF' + buildBackupCsv();
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
  a.href = url;
  a.download = 'radar-de-solucoes-backup-' + stamp + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function render() {

function renderAnalyst(analystKey) {
  const analyst = ANALYSTS.filter(function(a){ return a.key === analystKey; })[0];

  $screen.innerHTML = ''
    + '<div class="panel">'
    +   '<div class="top-actions">'
    +     '<div>'
    +       '<h2 style="margin:0 0 3px;font-size:17px;">' + escapeHtml(analyst.name) + ' — suas notas</h2>'
    +       '<p class="muted" style="font-size:12.5px;margin:0;">' + scoredCount + ' de ' + ideas.length + ' ideias avaliadas. As notas salvam automaticamente no banco de dados.</p>'
    +     '</div>'
    +   '</div>'
    +   errorBannerHtml()
    + '</div>'
    + (ideas.length === 0
      ? '<div class="panel"><div class="empty"><div class="big">🕐</div>Nenhuma ideia cadastrada ainda. Peça para a organização cadastrar em "Organização".</div></div>'
      : ideas.map(function(idea) {
          const s = myScores[idea.id] || {};
          const hasAny = CRITERIA.some(function(c) { return s[c.key] !== undefined && s[c.key] !== ''; });
          const total = CRITERIA.reduce(function(sum, c) { return sum + (Number(s[c.key]) || 0); }, 0);
          return '<div class="idea-card" data-idea="' + idea.id + '">'
            + '<div class="idea-card-head">'
            +   '<div>'
            +     '<div class="idea-name">' + escapeHtml(idea.name) + '</div>'
            +     '<div class="idea-meta">'
            +       (idea.vertical ? '<span class="tag">' + escapeHtml(idea.vertical) + '</span>' : '')
            +       '<span class="tag">Dia ' + escapeHtml(idea.day || 1) + '</span>'
            +     '</div>'
            +   '</div>'
            +   '<div style="text-align:right;">'
            +     '<div class="status-pill ' + (hasAny ? 'done' : 'pending') + '">' + (hasAny ? '✓ avaliado' : 'pendente') + '</div>'
            +     '<div class="idea-total" style="margin-top:6px;">' + fmt(total) + ' / 100</div>'
            +   '</div>'
            + '</div>'
            + '<div class="score-grid">'
            +   CRITERIA.map(function(c) {
                  return '<div class="field">'
                    + '<label>' + c.label + ' <span class="score-cap">(0–' + c.max + ')</span></label>'
                    + '<input type="number" min="0" max="' + c.max + '" step="0.25" data-score-crit="' + c.key + '" data-score-idea="' + idea.id + '" value="' + (s[c.key] !== undefined ? s[c.key] : '') + '" />'
                    + '</div>';
                }).join('')
            + '</div>'
            + '</div>';
        }).join('')
      );

  let saveTimer = null;
  $screen.querySelectorAll('[data-score-idea]').forEach(function(inp) {
    inp.addEventListener('input', function() {
      const ideaId = inp.dataset.scoreIdea;
      const crit = inp.dataset.scoreCrit;
      const max = Number(inp.max);
      let val = inp.value;
      if (val !== '' && Number(val) > max) val = String(max);
      if (val !== '' && Number(val) < 0) val = '0';
      inp.value = val;

      if (!scores[analystKey]) scores[analystKey] = {};
      if (!scores[analystKey][ideaId]) scores[analystKey][ideaId] = {};
      scores[analystKey][ideaId][crit] = val === '' ? '' : Number(val);

      const card = inp.closest('.idea-card');
      const s = scores[analystKey][ideaId];
      const total = CRITERIA.reduce(function(sum, c) { return sum + (Number(s[c.key]) || 0); }, 0);
      card.querySelector('.idea-total').textContent = fmt(total) + ' / 100';
      const pill = card.querySelector('.status-pill');

      clearTimeout(saveTimer);
      pill.className = 'status-pill pending';
      pill.style.background = '';
      pill.style.color = '';
      pill.textContent = 'salvando…';
      saveTimer = setTimeout(async function() {
        const body = {
          idea_id: ideaId,
          analyst_key: analystKey,
          impacto: s.impacto === '' || s.impacto === undefined ? null : s.impacto,
          viabilidade: s.viabilidade === '' || s.viabilidade === undefined ? null : s.viabilidade,
          estrategia: s.estrategia === '' || s.estrategia === undefined ? null : s.estrategia,
          inovacao: s.inovacao === '' || s.inovacao === undefined ? null : s.inovacao,
          risco: s.risco === '' || s.risco === undefined ? null : s.risco,
        };
        const res = await sb('scores?on_conflict=idea_id,analyst_key', {
          method: 'POST',
          headers: { Prefer: 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify([body]),
        });
        const hasAnyNow = CRITERIA.some(function(c) { return s[c.key] !== undefined && s[c.key] !== ''; });
        if (res.ok) {
          pill.className = 'status-pill ' + (hasAnyNow ? 'done' : 'pending');
          pill.textContent = hasAnyNow ? '✓ salvo' : 'pendente';
          pill.style.background = '';
          pill.style.color = '';
        } else {
          pill.className = 'status-pill pending';
          pill.style.background = 'rgba(226,87,76,0.16)';
          pill.style.color = '#ff8f86';
          pill.textContent = '⚠️ não salvou — verifique a internet';
        }
      }, 500);
    });
  });

  wireErrorBanner();
}

        : '<button class="btn ceremony-reveal-btn" id="ceremony-reveal" ' + (current.ready ? '' : 'title="Ainda sem dados suficientes, mas pode revelar mesmo assim"') + '>🔮 Revelar vencedor</button>')

    + '<b>4.</b> <b>Ranking &amp; Premiações</b> soma tudo automaticamente e mostra os vencedores em tempo real — ideal para deixar aberto no telão.<br/>'
    + '<b>5.</b> Critérios: Impacto (0–40), Viabilidade (0–25), Estratégia (0–20), Inovação (0–10), Risco (0–5) — total de 100 pontos.'
    + '</div>';
}
function wireHelpToggle() {
  const btn = document.getElementById('help-toggle');
  const box = document.getElementById('help-box');
  if (!btn) return;
  btn.addEventListener('click', function() {
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  });
}

// ---------- boot ----------
async function boot() {
  await loadAll();
  render();
  setInterval(async function() {
    if (currentTab.indexOf('analyst:') === 0 || currentTab === 'org') return;
    await loadAll();
    render();
  }, 6000);
}
boot();

})();
</script>
